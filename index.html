<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glossary Map | 単語地図</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;600&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F2EAE0;    
            --brand-color: #4A3B6B; 
            --accent-blue: #B4D3D9; 
            --accent-pink: #BDA6CE; 
            --font-display: 'Instrument Serif', serif;
            --font-utility: 'Inter', sans-serif;
            --font-jp: 'Noto Serif JP', serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--brand-color);
            font-family: var(--font-display);
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding-bottom: 80px;
            overflow: hidden; /* 密碼輸入前禁止滾動 */
        }

        /* 密碼彈窗遮罩 */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; transition: opacity 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .lock-box {
            text-align: center;
            padding: 40px;
            border: 0.5px solid var(--brand-color);
            background: white;
            width: 80%; max-width: 300px;
        }
        .pass-input {
            width: 100%;
            border: none; border-bottom: 1.5px solid var(--brand-color);
            background: transparent;
            font-size: 2rem; text-align: center;
            color: var(--brand-color);
            font-family: var(--font-display);
            outline: none; margin-top: 20px;
            letter-spacing: 0.5em;
        }
        .hidden-ui { opacity: 0; pointer-events: none; }

        /* 噪點層 */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.15; pointer-events: none; z-index: 999;
            animation: noise-move 0.2s infinite steps(2);
        }
        @keyframes noise-move {
            0% { transform: translate(0,0); }
            100% { transform: translate(1%, 1%); }
        }

        .utility-text { font-family: var(--font-utility); font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; }

        header {
            position: sticky; top: 0; background: var(--bg-color);
            border-bottom: 1px solid var(--accent-pink);
            padding: 15px 15px 10px; z-index: 100;
        }

        .huge-input {
            width: 100%; background: transparent; border: none;
            font-size: 2.8rem; color: var(--brand-color);
            outline: none; font-family: var(--font-display); margin-top: 5px;
        }

        #map-canvas { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 12px; }

        .node {
            background: rgba(255, 255, 255, 0.5); border: 0.5px solid var(--brand-color);
            padding: 20px 10px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            min-height: 130px;
        }

        .type-c { grid-column: span 2; border-width: 1.5px; background: #fff; }
        .type-a { border-color: var(--accent-pink); border-style: dashed; } 
        .type-h1 { border-color: var(--accent-blue); background: rgba(180, 211, 217, 0.15); }

        .jp-container { margin: 5px 0; }
        .furigana { font-size: 10px; opacity: 0.7; font-family: var(--font-utility); margin-bottom: 2px; }
        .jp-word { font-family: var(--font-jp); font-size: 1.7rem; line-height: 1.1; font-weight: 700; }
        .meaning-text { font-size: 10px; font-weight: 600; border-top: 0.5px solid currentColor; margin-top: 10px; padding-top: 6px; width: 80%; }

        #export-btn {
            position: fixed; right: 20px; bottom: 90px;
            width: 55px; height: 55px; background: var(--brand-color);
            color: var(--bg-color); border: none; display: flex;
            align-items: center; justify-content: center; font-size: 8px;
            cursor: pointer; z-index: 1000; opacity: 0; transition: opacity 0.4s;
        }
        #export-btn.visible { opacity: 1; }

        footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #fff; border-top: 1px solid var(--accent-blue);
            display: flex; overflow-x: auto; padding: 15px; gap: 18px; z-index: 100;
        }
        .path-step { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-box">
            <div class="utility-text">Restricted Access</div>
            <input type="password" id="passcode" class="pass-input" maxlength="4" placeholder="••••" oninput="checkPass(this)">
            <div class="utility-text mt-4 opacity-40">Entry Key Required</div>
        </div>
    </div>

    <div id="main-content" class="hidden-ui">
        <header>
            <div class="flex justify-between items-center opacity-70">
                <span class="utility-text">Glossary Map / 単語地図</span>
                <span id="status" class="utility-text">Ready</span>
            </div>
            <input type="text" id="input-word" class="huge-input" placeholder="Discovery" onkeypress="if(event.key==='Enter') handleSearch()">
        </header>

        <button id="export-btn" class="utility-text" onclick="exportToTxt()">Export</button>

        <main id="map-canvas">
            <div class="col-span-2 py-24 text-center opacity-30">
                <p class="text-5xl italic font-light">Delving</p>
                <p class="utility-text mt-3">Navigate the architecture of meaning</p>
            </div>
        </main>

        <footer id="path-list" class="utility-text"></footer>
    </div>

<script>
    const API_KEY = 'sk-f1685a4ad6a748259194cda95762282d';
    const cache = {};
    const historyPath = [];
    let currentData = null;
    let lastQuery = "";

    // 密碼檢查
    function checkPass(el) {
        if (el.value === '0914') {
            document.getElementById('lock-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
                document.getElementById('main-content').style.pointerEvents = 'auto';
                document.body.style.overflow = 'auto';
            }, 600);
        } else if (el.value.length === 4) {
            el.value = '';
            el.placeholder = 'ERR';
            setTimeout(() => { el.placeholder = '••••'; }, 1000);
        }
    }

    async function handleSearch(word) {
        const query = word || document.getElementById('input-word').value;
        if (!query) return;

        lastQuery = query;
        document.getElementById('status').innerText = 'Syncing...';
        const canvas = document.getElementById('map-canvas');
        canvas.style.opacity = '0.4';

        const data = await fetchData(query);
        
        document.getElementById('status').innerText = 'Ready';
        canvas.style.opacity = '1';

        if (data) {
            currentData = data;
            renderMap(data);
            updatePath(data.c.w);
            document.getElementById('export-btn').classList.add('visible');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    async function fetchData(word) {
        if (cache[word]) return cache[word];
        const prompt = `JSON only: {"c":{"w":"Kanji","r":"Hiragana","m":"Chinese"},"ext":[{"w":"Kanji","r":"Hiragana","m":"Chinese","t":"s/a/h1"}]}. Map English to Japanese. Use semantic drift.`;

        try {
            const res = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [{ role: "system", content: prompt }, { role: "user", content: word }],
                    response_format: { type: "json_object" }
                })
            });
            const json = await res.json();
            const data = JSON.parse(json.choices[0].message.content);
            cache[word] = data;
            return data;
        } catch (e) { return null; }
    }

    function renderMap(data) {
        const canvas = document.getElementById('map-canvas');
        canvas.innerHTML = ''; 
        canvas.appendChild(createNode(data.c.w, data.c.r, data.c.m, 'type-c'));
        const types = ['type-h1', 'type-a', 'type-r', 'type-h1', 'type-a', 'type-r'].sort(() => Math.random() - 0.5);
        data.ext.forEach((item, index) => {
            const node = createNode(item.w, item.r, item.m, types[index] || 'type-r');
            node.onclick = () => handleSearch(item.w);
            canvas.appendChild(node);
        });
    }

    function createNode(word, reading, meaning, type) {
        const div = document.createElement('div');
        div.className = `node ${type}`;
        div.innerHTML = `
            <div class="jp-container">
                <div class="furigana">${reading}</div>
                <div class="jp-word">${word}</div>
            </div>
            <div class="utility-text meaning-text">${meaning}</div>
        `;
        return div;
    }

    function updatePath(word) {
        if (historyPath[historyPath.length - 1] === word) return;
        historyPath.push(word);
        const list = document.getElementById('path-list');
        list.innerHTML = historyPath.map((w, i) => `
            <div class="path-step" onclick="handleSearch('${w}')">
                <span style="color:var(--accent-pink)">${i+1}</span><span>${w}</span>
            </div>
        `).join('');
        list.scrollLeft = list.scrollWidth;
    }

    function exportToTxt() {
        if (!currentData) return;
        let content = `${lastQuery}\n${currentData.c.w} - ${currentData.c.r} - ${currentData.c.m}\n`;
        currentData.ext.forEach(item => { content += `${item.w} - ${item.r} - ${item.m}\n`; });
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${lastQuery}_glossary.txt`;
        a.click();
    }

    // 自動聚焦密碼框
    window.onload = () => { document.getElementById('passcode').focus(); };
</script>
</body>
</html>
