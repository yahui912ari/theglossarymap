<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glossary Map | 単語地図</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;600&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F2EAE0;    
            --brand-color: #4A3B6B; 
            --accent-blue: #B4D3D9; 
            --accent-pink: #BDA6CE; 
            --font-display: 'Instrument Serif', serif;
            --font-utility: 'Inter', sans-serif;
            --font-jp: 'Noto Serif JP', serif;
        }

        body { background-color: var(--bg-color); color: var(--brand-color); font-family: var(--font-display); -webkit-font-smoothing: antialiased; margin: 0; padding-bottom: 70px; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.12; pointer-events: none; z-index: 999; animation: noise-move 0.2s infinite steps(2); }
        @keyframes noise-move { 0% { transform: translate(0,0); } 100% { transform: translate(1%, 1%); } }

        .utility-text { font-family: var(--font-utility); font-size: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        header { position: sticky; top: 0; background: var(--bg-color); border-bottom: 1px solid var(--accent-pink); padding: 10px 12px 6px; z-index: 100; }
        .huge-input { width: 100%; background: transparent; border: none; font-size: 2.2rem; color: var(--brand-color); outline: none; font-family: var(--font-display); margin-top: 2px; }

        #map-canvas { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; padding: 8px; }
        .node { background: rgba(255, 255, 255, 0.4); border: 0.5px solid var(--brand-color); padding: 12px 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; min-height: 85px; }
        
        .type-c { grid-column: span 2; border-width: 1px; background: #fff; min-height: 100px; }
        .type-drift { border-color: var(--accent-pink); border-style: dashed; } 
        .type-tech { border-color: var(--accent-blue); background: rgba(180, 211, 217, 0.1); }

        .jp-container { margin: 2px 0; }
        .furigana { font-size: 9px; opacity: 0.7; font-family: var(--font-utility); margin-bottom: 1px; }
        .jp-word { font-family: var(--font-jp); font-size: 1.25rem; line-height: 1.1; font-weight: 700; }
        .meaning-text { font-size: 9px; font-weight: 600; border-top: 0.5px solid currentColor; margin-top: 6px; padding-top: 4px; width: 85%; }

        #export-btn { position: fixed; right: 12px; bottom: 80px; width: 45px; height: 45px; background: var(--brand-color); color: var(--bg-color); border: none; display: flex; align-items: center; justify-content: center; font-size: 7px; cursor: pointer; z-index: 1000; opacity: 0; }
        #export-btn.visible { opacity: 1; }

        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid var(--accent-blue); display: flex; overflow-x: auto; padding: 10px; gap: 12px; z-index: 100; scrollbar-width: none; }
        .path-step { display: inline-flex; align-items: center; gap: 4px; font-size: 9px; white-space: nowrap; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="flex justify-between items-center opacity-60">
            <span class="utility-text">Glossary Map / 単語地図</span>
            <span id="status" class="utility-text">Ready</span>
        </div>
        <input type="text" id="input-word" class="huge-input" placeholder="Discovery..." onkeypress="if(event.key==='Enter') handleSearch()">
    </header>

    <button id="export-btn" class="utility-text" onclick="exportToTxt()">Export</button>
    <main id="map-canvas">
        <div class="col-span-2 py-16 text-center opacity-30">
            <p class="text-4xl italic font-light">Delving</p>
        </div>
    </main>
    <footer id="path-list" class="utility-text"></footer>

<script>
    const API_KEY = 'sk-f1685a4ad6a748259194cda95762282d';
    const cache = {};
    const historyPath = [];
    let currentData = null;
    let lastQuery = "";

    async function handleSearch(word) {
        const query = word || document.getElementById('input-word').value;
        if (!query) return;
        lastQuery = query;
        document.getElementById('status').innerText = 'Syncing...';
        const canvas = document.getElementById('map-canvas');
        canvas.style.opacity = '0.4';
        
        const data = await fetchData(query);
        
        document.getElementById('status').innerText = 'Ready';
        canvas.style.opacity = '1';

        if (data) {
            // 在渲染前進行 JavaScript 層面的強制去重
            const uniqueExt = [];
            const seenWords = new Set([data.c.w]); // 包含中心詞，防止擴展詞重複中心詞
            
            data.ext.forEach(item => {
                if (!seenWords.has(item.w)) {
                    uniqueExt.push(item);
                    seenWords.add(item.w);
                }
            });
            data.ext = uniqueExt.slice(0, 8); // 確保最終只有 8 個獨特的詞

            currentData = data;
            renderMap(data);
            updatePath(data.c.w);
            document.getElementById('export-btn').classList.add('visible');
        }
    }

    async function fetchData(word) {
        if (cache[word]) return cache[word];
        
        // 增加嚴格的唯一性指令
        const prompt = `Task: Generate 8 UNIQUE Japanese words related to "${word}".
        Constraints:
        1. "c": Direct translation.
        2. "ext": 8 DISTINCT related words.
        DIVERSITY RULE: Each word in "ext" MUST represent a different concept. 
        - DO NOT REPEAT ANY WORD.
        - DO NOT USE KANJI FROM "c".
        - DIMENSIONS: 1 opposite, 1 biology, 1 social, 1 object, 1 action, 1 feeling, 1 academic, 1 drift.
        Example: If "c" is "愛嬌", "ext" should be like ["笑顔", "嫉妬", "仮面", "魅了", "拒絶", "ホルモン", "心理學", "鏡"].
        Output JSON ONLY.`;

        try {
            const res = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [{ role: "system", content: prompt }, { role: "user", content: word }],
                    response_format: { type: "json_object" }
                })
            });
            const json = await res.json();
            const data = JSON.parse(json.choices[0].message.content);
            cache[word] = data;
            return data;
        } catch (e) { return null; }
    }

    function renderMap(data) {
        const canvas = document.getElementById('map-canvas');
        canvas.innerHTML = ''; 
        canvas.appendChild(createNode(data.c.w, data.c.r, data.c.m, 'type-c'));
        
        data.ext.forEach((item, index) => {
            const type = index % 2 === 0 ? 'type-drift' : 'type-tech';
            const node = createNode(item.w, item.r, item.m, type);
            node.onclick = () => handleSearch(item.w);
            canvas.appendChild(node);
        });
    }

    function createNode(word, reading, meaning, type) {
        const div = document.createElement('div');
        div.className = `node ${type}`;
        div.innerHTML = `<div class="jp-container"><div class="furigana">${reading}</div><div class="jp-word">${word}</div></div><div class="utility-text meaning-text">${meaning}</div>`;
        return div;
    }

    function updatePath(word) {
        if (historyPath[historyPath.length - 1] === word) return;
        historyPath.push(word);
        const list = document.getElementById('path-list');
        list.innerHTML = historyPath.map((w, i) => `<div class="path-step" onclick="handleSearch('${w}')"><span>${i+1}</span><span>${w}</span></div>`).join('');
        list.scrollLeft = list.scrollWidth;
    }

    function exportToTxt() {
        if (!currentData) return;
        let content = `${lastQuery}\n${currentData.c.w} - ${currentData.c.r} - ${currentData.c.m}\n`;
        currentData.ext.forEach(item => { content += `${item.w} - ${item.r} - ${item.m}\n`; });
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${lastQuery}_map.txt`; a.click();
    }
</script>
</body>
</html>
